<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lonix Music</title>
    <style>
        /* CSS - Utseendet */
        :root {
            --primary: #6c5ce7;
            --bg: #1a1a2e;
            --card: #16213e;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
        }

        .player-card {
            background: var(--card);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
        }

        /* Bild-behållare i spelaren */
        .img-area {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .img-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-info h2 { margin: 10px 0 5px; font-size: 1.4rem; }
        .track-info h3 { color: #a2a2a2; font-size: 1rem; margin-bottom: 25px; font-weight: 400; }

        .progress-container {
            background: #0f3460;
            border-radius: 10px;
            height: 8px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .progress {
            background: var(--primary);
            border-radius: 10px;
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.8rem;
            transition: transform 0.2s;
        }

        .btn:hover { transform: scale(1.1); }
        .btn:active { transform: scale(0.9); }

        .play-btn {
            background: var(--primary);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }
    </style>
</head>
<body>

<div class="player-card">
    <div class="img-area">
        <img id="main-img" src="" alt="Album Art">
    </div>

    <div class="track-info">
        <h2 id="title">Laddar...</h2>
        <h3 id="artist">Artistnamn</h3>
    </div>
    
    <div class="progress-container" id="progress-container">
        <div class="progress" id="progress"></div>
    </div>

    <div class="controls">
        <button id="prev" class="btn"> < </button>
        <button id="play" class="btn play-btn">▶</button>
        <button id="next" class="btn"> > </button>
    </div>

    <audio id="audio"></audio>
</div>

<script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const title = document.getElementById('title');
    const artist = document.getElementById('artist');
    const mainImg = document.getElementById('main-img');
    const progress = document.getElementById('progress');
    const progressContainer = document.getElementById('progress-container');

    // 1. DIN SPELLISTA - Lägg till dina bilder här!
    const songs = [
        {
            name: 'AUDIO-2026-02-07-11-37-02', 
            displayName: 'ShingShangShong',
            artistName: 'LogixWow',
            image: 'IMG_0884.jpeg' // Ändra till namnet på din bildfil
        },
        {
            name: 'min-lat-2',
            displayName: 'Andra Låten',
            artistName: 'Artist 2',
            image: 'bild2.jpg' // Ändra till namnet på din bildfil
        }
    ];

    let songIndex = 0;
    let isPlaying = false;

    // Funktion för att uppdatera låsskärmen
    function updateMediaSession(song) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: song.displayName,
                artist: song.artistName,
                album: 'Lonix Music',
                artwork: [
                    { src: song.image, sizes: '512x512', type: 'image/jpeg' }
                ]
            });

            // Gör så att knapparna på låsskärmen fungerar
            navigator.mediaSession.setActionHandler('play', playSong);
            navigator.mediaSession.setActionHandler('pause', pauseSong);
            navigator.mediaSession.setActionHandler('previoustrack', () => prevBtn.click());
            navigator.mediaSession.setActionHandler('nexttrack', () => nextBtn.click());
        }
    }

    function loadSong(song) {
        title.innerText = song.displayName;
        artist.innerText = song.artistName;
        document.title = song.displayName; // Uppdaterar även flikens namn
        mainImg.src = song.image;
        audio.src = `${song.name}.mp3`;
        
        updateMediaSession(song);
    }

    function playSong() {
        isPlaying = true;
        playBtn.innerText = 'II';
        audio.play();
    }

    function pauseSong() {
        isPlaying = false;
        playBtn.innerText = '▶';
        audio.pause();
    }

    playBtn.addEventListener('click', () => (isPlaying ? pauseSong() : playSong()));
    
    prevBtn.addEventListener('click', () => {
        songIndex = (songIndex - 1 + songs.length) % songs.length;
        loadSong(songs[songIndex]);
        playSong();
    });

    nextBtn.addEventListener('click', () => {
        songIndex = (songIndex + 1) % songs.length;
        loadSong(songs[songIndex]);
        playSong();
    });

    audio.addEventListener('timeupdate', (e) => {
        const { duration, currentTime } = e.srcElement;
        const progressPercent = (currentTime / duration) * 100;
        progress.style.width = `${progressPercent}%`;
    });

    progressContainer.addEventListener('click', (e) => {
        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;
        const duration = audio.duration;
        audio.currentTime = (clickX / width) * duration;
    });

    audio.addEventListener('ended', () => nextBtn.click());

    loadSong(songs[songIndex]);
</script>

</body>
</html>
